name: EasyWhitelist
version: ${version}
main: xyz.nikitacartes.easywhitelist.EasyWhitelist
api-version: '1.21'
author: NikitaCartes
description: Whitelist players from PostgreSQL
commands:
  easywhitelist:
    description: Manage PostgreSQL-backed whitelist
    usage: /easywhitelist reload|add <nick>|remove <nick>|list
permissions:
  easywhitelist.admin:
    description: Grants access to all EasyWhitelist admin commands
    default: op
  easywhitelist.admin.reload:
    description: Allows reloading the whitelist cache
    default: op
  easywhitelist.admin.add:
    description: Allows adding a nickname to the whitelist
    default: op
  easywhitelist.admin.remove:
    description: Allows removing a nickname from the whitelist
    default: op
  easywhitelist.admin.list:
    description: Allows listing current whitelist entries
    default: op