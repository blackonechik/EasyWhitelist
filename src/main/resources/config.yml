database:
  # Full PostgreSQL JDBC URL. Example:
  # jdbc-url: jdbc:postgresql://127.0.0.1:5432/minecraft?sslmode=disable
  jdbc-url: jdbc:postgresql://127.0.0.1:5432/minecraft?sslmode=disable

# How often the plugin refreshes its cache from PostgreSQL.
refresh-interval-seconds: 15

messages:
  # Accepts legacy ampersand color codes.
  kick-message: "&cYou are not on the whitelist."
  init-not-ready: "&cWhitelist is still initializing. Try again in a moment."
  no-permission: "&cНет прав."
  usage: "&eИспользование: /easywhitelist reload|add <nick>|remove <nick>|list"
  usage-add: "&eИспользование: /easywhitelist add <nick>"
  usage-remove: "&eИспользование: /easywhitelist remove <nick>"
  reload-success: "&aКеш вайтлиста обновлен."
  add-success: "&aНик &f{nick} &aдобавлен в вайтлист."
  remove-success: "&aНик &f{nick} &aудален из вайтлиста."
  list-header: "&eWhitelisted users (&f{count}&e): &f{list}"
  list-empty: "&7empty"
  error: "&cОшибка: &f{error}"